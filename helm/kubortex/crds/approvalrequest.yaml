apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: approvalrequests.kubortex.io
spec:
  group: kubortex.io
  names:
    kind: ApprovalRequest
    listKind: ApprovalRequestList
    plural: approvalrequests
    singular: approvalrequest
    shortNames: [ar]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: Approval gate for a remediation action.
          properties:
            spec:
              type: object
              description: Requested action and approval requirements.
              properties:
                incidentRef:
                  type: string
                  description: Name of the Incident that requires approval.
                remediationPlanRef:
                  type: string
                  description: Name of the RemediationPlan that proposed the action.
                action:
                  type: object
                  description: Action awaiting approval.
                  properties:
                    type:
                      type: string
                      description: Remediation action type.
                    target:
                      type: object
                      description: Kubernetes object targeted by the action.
                      properties:
                        kind:
                          type: string
                          description: Kind of the target resource.
                        namespace:
                          type: string
                          description: Namespace of the target resource, when namespaced.
                        name:
                          type: string
                          description: Name of the target resource.
                    parameters:
                      type: object
                      description: Action-specific parameters presented for review.
                      x-kubernetes-preserve-unknown-fields: true
                    rationale:
                      type: string
                      description: Reason the action is recommended.
                    riskTier:
                      type: string
                      description: Estimated risk level of the action.
                investigationContext:
                  type: object
                  description: Investigation data supplied to approvers.
                  x-kubernetes-preserve-unknown-fields: true
                approvalLevel:
                  type: string
                  description: Approval role required before execution.
                  enum: [team-lead, sre-manager, security-team]
                timeoutSeconds:
                  type: integer
                  description: Time allowed for a decision before timeout.
              required: [incidentRef, action]
            status:
              type: object
              description: Recorded approval decision and current state.
              properties:
                phase:
                  type: string
                  description: Current lifecycle phase of the approval request.
                  enum: [Pending, Approved, Rejected, TimedOut]
                decision:
                  type: string
                  description: Final decision made on the request.
                  enum: [approved, rejected]
                decidedBy:
                  type: string
                  description: Identity that made the decision.
                decidedAt:
                  type: string
                  description: Time the decision was recorded.
                  format: date-time
                reason:
                  type: string
                  description: Reason supplied with the decision.
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Level
          type: string
          jsonPath: .spec.approvalLevel
        - name: Action
          type: string
          jsonPath: .spec.action.type
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
