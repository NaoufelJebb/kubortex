apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: investigations.kubortex.io
spec:
  group: kubortex.io
  names:
    kind: Investigation
    listKind: InvestigationList
    plural: investigations
    singular: investigation
    shortNames: [inv]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: Investigation task spawned to diagnose an incident.
          properties:
            spec:
              type: object
              description: Desired investigation inputs and execution limits.
              properties:
                incidentRef:
                  type: string
                  description: Name of the Incident being investigated.
                summary:
                  type: string
                  description: Incident summary passed to the investigation.
                category:
                  type: string
                  description: Incident category under investigation.
                severity:
                  type: string
                  description: Incident severity under investigation.
                targetRef:
                  type: object
                  description: Kubernetes object being investigated.
                  properties:
                    kind:
                      type: string
                      description: Kind of the target resource.
                    namespace:
                      type: string
                      description: Namespace of the target resource, when namespaced.
                    name:
                      type: string
                      description: Name of the target resource.
                signals:
                  type: array
                  description: Signals supplied as investigation evidence.
                  items:
                    type: object
                    description: Raw signal payload used during diagnosis.
                    x-kubernetes-preserve-unknown-fields: true
                diagnosticHints:
                  type: object
                  description: Additional hints to guide the investigation.
                  x-kubernetes-preserve-unknown-fields: true
                priorAttempts:
                  type: array
                  description: Previous investigation or remediation attempts.
                  items:
                    type: object
                    description: Prior attempt record supplied as context.
                    x-kubernetes-preserve-unknown-fields: true
                maxIterations:
                  type: integer
                  description: Maximum reasoning iterations allowed.
                deadlineSeconds:
                  type: integer
                  description: Time budget for the investigation.
                labels:
                  type: object
                  description: Labels copied onto the investigation resource.
                  additionalProperties:
                    type: string
                    description: Label value.
              required: [incidentRef, summary, category, severity]
            status:
              type: object
              description: Observed investigation progress and results.
              properties:
                phase:
                  type: string
                  description: Current lifecycle phase of the investigation.
                  enum: [Pending, InProgress, Completed, TimedOut, Failed]
                claimedBy:
                  type: string
                  description: Controller instance currently handling the investigation.
                claimedAt:
                  type: string
                  description: Time the investigation was claimed for processing.
                  format: date-time
                result:
                  type: object
                  description: Investigation output, such as hypotheses or findings.
                  x-kubernetes-preserve-unknown-fields: true
                telemetry:
                  type: object
                  description: Execution telemetry collected during the investigation.
                  x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ClaimedBy
          type: string
          jsonPath: .status.claimedBy
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
