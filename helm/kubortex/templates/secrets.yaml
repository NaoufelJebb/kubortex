{{- if and (not .Values.llm.existingSecret) .Values.llm.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubortex.fullname" . }}-llm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.labels" . | nindent 4 }}
type: Opaque
stringData:
  KUBORTEX_LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
  KUBORTEX_LLM_MODEL: {{ .Values.llm.model | quote }}
{{- end }}
---
{{- if and (not .Values.slack.existingSecret) .Values.slack.botToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubortex.fullname" . }}-slack
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.labels" . | nindent 4 }}
type: Opaque
stringData:
  KUBORTEX_SLACK_BOT_TOKEN: {{ .Values.slack.botToken | quote }}
  KUBORTEX_SLACK_CHANNEL: {{ .Values.slack.channel | quote }}
  KUBORTEX_SLACK_ESCALATION_CHANNEL: {{ .Values.slack.escalationChannel | quote }}
{{- end }}
