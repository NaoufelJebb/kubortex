{{- if .Values.components.edge }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubortex-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "edge") | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubortex.fullname" . }}-edge
  labels:
    {{- include "kubortex.componentLabels" (list . "edge") | nindent 4 }}
rules:
  - apiGroups: [kubortex.io]
    resources: [incidents]
    verbs: [get, list, create, update, patch]
  - apiGroups: [kubortex.io]
    resources: [incidents/status]
    verbs: [get, patch]
  - apiGroups: [kubortex.io]
    resources: ["*"]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubortex.fullname" . }}-edge
  labels:
    {{- include "kubortex.componentLabels" (list . "edge") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubortex.fullname" . }}-edge
subjects:
  - kind: ServiceAccount
    name: kubortex-edge
    namespace: {{ .Release.Namespace }}
{{- end }}
