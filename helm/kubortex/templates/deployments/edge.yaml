{{- if .Values.components.edge }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubortex.fullname" . }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "edge") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.edge }}
  selector:
    matchLabels:
      {{- include "kubortex.selectorLabels" (list . "edge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubortex.selectorLabels" (list . "edge") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: kubortex-edge
      containers:
        - name: edge
          image: "{{ .Values.images.edge.repository }}:{{ .Values.images.edge.tag }}"
          imagePullPolicy: {{ .Values.images.edge.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.edge.port }}
              protocol: TCP
          env:
            {{- include "kubortex.commonEnv" . | nindent 12 }}
            - name: KUBORTEX_HOST
              value: {{ .Values.edge.host | quote }}
            - name: KUBORTEX_PORT
              value: {{ .Values.edge.port | quote }}
            - name: KUBORTEX_CORRELATION_WINDOW_SECONDS
              value: {{ .Values.edge.correlationWindowSeconds | quote }}
          envFrom:
            - secretRef:
                name: {{ include "kubortex.slackSecretName" . }}
                optional: true
          resources:
            {{- toYaml .Values.resources.edge | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubortex.fullname" . }}-edge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "edge") | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kubortex.selectorLabels" (list . "edge") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
