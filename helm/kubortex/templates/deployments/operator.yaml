{{- if .Values.components.operator }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubortex.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "operator") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.operator }}
  selector:
    matchLabels:
      {{- include "kubortex.selectorLabels" (list . "operator") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubortex.selectorLabels" (list . "operator") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: kubortex-operator
      containers:
        - name: operator
          image: "{{ .Values.images.operator.repository }}:{{ .Values.images.operator.tag }}"
          imagePullPolicy: {{ .Values.images.operator.pullPolicy }}
          env:
            {{- include "kubortex.commonEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "kubortex.llmSecretName" . }}
                optional: true
          resources:
            {{- toYaml .Values.resources.operator | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
