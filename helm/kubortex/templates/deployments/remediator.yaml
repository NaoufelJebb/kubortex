{{- if .Values.components.remediator }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubortex.fullname" . }}-remediator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "remediator") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.remediator }}
  selector:
    matchLabels:
      {{- include "kubortex.selectorLabels" (list . "remediator") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubortex.selectorLabels" (list . "remediator") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: kubortex-remediator
      containers:
        - name: remediator
          image: "{{ .Values.images.remediator.repository }}:{{ .Values.images.remediator.tag }}"
          imagePullPolicy: {{ .Values.images.remediator.pullPolicy }}
          env:
            {{- include "kubortex.commonEnv" . | nindent 12 }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            {{- toYaml .Values.resources.remediator | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
