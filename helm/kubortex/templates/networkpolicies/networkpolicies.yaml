{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubortex.fullname" . }}-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- if .Values.components.edge }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubortex.fullname" . }}-edge-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "edge") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubortex.selectorLabels" (list . "edge") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.edge.port }}
          protocol: TCP
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- if .Values.components.investigator }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubortex.fullname" . }}-investigator-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "investigator") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubortex.selectorLabels" (list . "investigator") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 9090
          protocol: TCP
    - ports:
        - port: 3100
          protocol: TCP
{{- end }}
{{- if .Values.components.remediator }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubortex.fullname" . }}-remediator-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubortex.componentLabels" (list . "remediator") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubortex.selectorLabels" (list . "remediator") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- end }}
